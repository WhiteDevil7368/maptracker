<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIM - Direct Live P2P Tracking</title>
    
    <!-- Leaflet.js Base Framework -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #f4f6f9; }
        
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        .control-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.96); padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 340px; display: flex; flex-direction: column; gap: 12px;
        }

        .role-selector { display: flex; gap: 10px; margin-bottom: 5px; }
        .role-btn { flex: 1; padding: 10px; font-weight: bold; border: 2px solid #0056b3; border-radius: 6px; cursor: pointer; background: white; color: #0056b3; }
        .role-btn.active { background: #0056b3; color: white; }

        .btn { background: #28a745; color: white; border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: center; }
        .btn-danger { background: #dc3545; display: none; animation: flash 1s infinite alternate; }

        .status-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; padding: 12px; font-size: 0.9rem; line-height: 1.4; }
        .label { font-weight: bold; color: #555; }
        .value { font-weight: bold; color: #0056b3; font-family: monospace; }

        @keyframes flash { from { background: #dc3545; } to { background: #ffc107; color: black; } }
        @keyframes pulse { 0% { transform: scale(0.6); opacity: 0.5; } 70% { transform: scale(1.2); opacity: 0.9; } 100% { transform: scale(0.6); opacity: 0.5; } }
        
        .home-pulse { background: #0056b3; border: 2px solid white; border-radius: 50%; animation: pulse 2.5s infinite ease-in-out; }
        
        .bus-emoji-container {
            font-size: 32px;
            text-align: center;
            line-height: 1;
            transition: transform 0.2s linear, left 0.2s linear, top 0.2s linear; 
            filter: drop-shadow(0px 3px 6px rgba(0,0,0,0.4));
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h2>DIGIM P2P Tracker</h2>
        
        <div class="role-selector">
            <button id="btn-student" class="role-btn active" onclick="setRole('student')">I am Student</button>
            <button id="btn-driver" class="role-btn" onclick="setRole('driver')">I am Driver</button>
        </div>

        <div class="status-box">
            <div><span class="label">Mode:</span> <span id="lbl-role" style="text-transform:uppercase; font-weight:bold; color:green;">Student View</span></div>
            <div><span class="label">Distance:</span> <span id="lbl-dist" class="value">Awaiting Direct Link...</span></div>
            <div><span class="label">P2P Tunnel:</span> <span id="lbl-status" class="value" style="color: red;">Disconnected</span></div>
        </div>

        <button id="action-btn" class="btn" style="display:none;" onclick="toggleTracking()">START BROADCASTING ROUTE</button>
        <button id="alarm-btn" class="btn btn-danger" onclick="stopAlarm()">🔔 TURN OFF ALARM 🔔</button>
    </div>

    <!-- Leaflet Map Engine -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- PeerJS Framework for Direct Hardware-to-Hardware Streaming Connection -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const homeLat = 17.694125;
        const homeLng = 83.171441;
        let currentRole = 'student';
        let isTracking = false;
        let watchId = null;
        let audioCtx = null;
        let alarmInterval = null;
        let routeLine = null;
        
        // Peer Network Variables
        let peer = null;
        let p2pConnection = null;
        // Hardcoded target session channel string name so both devices lock onto the exact same room link
        const channelRoomId = "digim-route-session-channel-777"; 

        // Initialize Map
        const map = L.map('map', { maxZoom: 19 }).setView([homeLat, homeLng], 15);
        map.zoomControl.setPosition('topright');

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png', { pane: 'shadowPane' }).addTo(map);

        const homeIcon = L.divIcon({ className: 'home-pulse', iconSize: [18, 18] });
        L.marker([homeLat, homeLng], { icon: homeIcon }).addTo(map).bindPopup("<b>Student Home Point</b>").openPopup();

        const busIcon = L.divIcon({ html: '🚌', className: 'bus-emoji-container', iconSize: [32, 32], iconAnchor: [16, 16] });
        let driverMarker = L.marker([0, 0], { icon: busIcon });

        // Initialize P2P Communication Link Engine
        function initP2PNetwork() {
            if (peer) peer.destroy();

            if (currentRole === 'driver') {
                // The driver initiates a generic client node
                peer = new Peer();
                
                peer.on('open', (id) => {
                    document.getElementById('lbl-status').innerText = "Connecting to Student...";
                    document.getElementById('lbl-status').style.color = "orange";
                    
                    // Attempt to punch connection tunnel straight to student listener channel
                    connectToStudent();
                });

                peer.on('error', (err) => {
                    // If student isn't ready yet, keep retrying silently every 3 seconds
                    setTimeout(connectToStudent, 3000);
                });
            } else {
                // The Student registers directly onto the static Room ID channel listening node
                peer = new Peer(channelRoomId);
                
                peer.on('open', (id) => {
                    document.getElementById('lbl-status').innerText = "Listening for Driver Direct link... 🟢";
                    document.getElementById('lbl-status').style.color = "green";
                });

                peer.on('connection', (conn) => {
                    p2pConnection = conn;
                    setupReceiverEvents();
                });
            }
        }

        function connectToStudent() {
            if (currentRole !== 'driver' || !peer) return;
            
            p2pConnection = peer.connect(channelRoomId, { reliable: true });
            
            p2pConnection.on('open', () => {
                document.getElementById('lbl-status').innerText = "Direct Pipeline Active! ⚡";
                document.getElementById('lbl-status').style.color = "green";
            });
        }

        function setupReceiverEvents() {
            p2pConnection.on('open', () => {
                document.getElementById('lbl-status').innerText = "Driver Device Linked! 🟢";
                document.getElementById('lbl-status').style.color = "green";
            });

            p2pConnection.on('data', (data) => {
                if (currentRole === 'student') {
                    document.getElementById('lbl-status').innerText = "Direct Stream Updating... 🔥";
                    updateMapGraphics(data.lat, data.lng);
                }
            });

            p2pConnection.on('close', () => {
                document.getElementById('lbl-status').innerText = "Driver Disconnected.";
                document.getElementById('lbl-status').style.color = "red";
            });
        }

        function setRole(role) {
            currentRole = role;
            document.getElementById('btn-student').classList.toggle('active', role === 'student');
            document.getElementById('btn-driver').classList.toggle('active', role === 'driver');
            document.getElementById('lbl-role').innerText = role === 'student' ? 'Student View' : 'Driver Broadcast';
            document.getElementById('lbl-role').style.color = role === 'student' ? 'green' : '#e0a800';
            
            stopTracking();
            if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
            if (map.hasLayer(driverMarker)) map.removeLayer(driverMarker);

            if(role === 'driver') {
                document.getElementById('action-btn').style.display = "block";
            } else {
                document.getElementById('action-btn').style.display = "none";
            }
            
            // Reconfigure the hardware routing sockets
            initP2PNetwork();
        }

        // Initialize setup
        setRole('student');

        // --- DRIVER CORE GPS EMITTER ---
        function toggleTracking() {
            if (!isTracking) {
                if (!navigator.geolocation) return alert("GPS features unavailable.");
                isTracking = true;
                document.getElementById('action-btn').innerText = "STOP BROADCASTING";
                document.getElementById('action-btn').style.background = "#dc3545";

                watchId = navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    updateMapGraphics(lat, lng);

                    // Shoot the data payload straight through the encrypted WebRTC data pipeline
                    if (p2pConnection && p2pConnection.open) {
                        p2pConnection.send({ lat: lat, lng: lng });
                    } else {
                        // If connection lost, try setting up tunnel again
                        connectToStudent();
                    }
                }, handleGPSError, { enableHighAccuracy: true, maximumAge: 0 });
            } else {
                stopTracking();
            }
        }

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            isTracking = false;
            document.getElementById('action-btn').innerText = "START BROADCASTING ROUTE";
            document.getElementById('action-btn').style.background = "#28a745";
        }

        // --- CORE SYNCHRONIZED MAP GRAPHICS ENGINE ---
        function updateMapGraphics(lat, lng) {
            if (!map.hasLayer(driverMarker)) driverMarker.addTo(map);
            driverMarker.setLatLng([lat, lng]);

            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline([[lat, lng], [homeLat, homeLng]], {
                color: '#d9534f', weight: 5, opacity: 0.9, dashArray: '10, 10', lineJoin: 'round'
            }).addTo(map);

            // Auto-focus view to frame both markers beautifully
            const trackingGroup = new L.featureGroup([
                L.marker([lat, lng]), 
                L.marker([homeLat, homeLng])
            ]);
            map.fitBounds(trackingGroup.getBounds().pad(0.3));

            const distance = calculateDistance(lat, lng, homeLat, homeLng);
            document.getElementById('lbl-dist').innerText = `${Math.round(distance)} meters away`;

            if (distance <= 50) { 
                triggerProximityAlarm();
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const phi1 = lat1 * Math.PI/180; const phi2 = lat2 * Math.PI/180;
            const deltaPhi = (lat2-lat1) * Math.PI/180; const deltaLambda = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function triggerProximityAlarm() {
            if (alarmInterval) return; 
            document.getElementById('lbl-status').innerText = "BUS ARRIVED! ALARM ACTIVE!";
            document.getElementById('lbl-status').style.color = "red";
            document.getElementById('alarm-btn').style.display = "block";

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            alarmInterval = setInterval(() => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15); 
            }, 300);
        }

        function stopAlarm() {
            if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            document.getElementById('alarm-btn').style.display = "none";
            document.getElementById('lbl-status').style.color = "black";
            setRole(currentRole);
        }

        function handleGPSError(err) { document.getElementById('lbl-status').innerText = `GPS Error (${err.code})`; }
    </script>
</body>
</html>
