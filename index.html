<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIM - Professional Real-Time Smart School Tracker</title>
    
    <!-- Core Leaflet Mapping CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Routing Engine Street Topography CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #eef2f7; }
        
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Sleek Modern Glass-Morphism Control Dashboard Panel */
        .control-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 24px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); width: 360px; 
            display: flex; flex-direction: column; gap: 14px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.6);
        }

        .role-selector { display: flex; gap: 12px; }
        .role-btn { flex: 1; padding: 12px; font-weight: 700; font-size: 0.9rem; border: 2px solid #1a73e8; border-radius: 8px; cursor: pointer; background: white; color: #1a73e8; transition: all 0.2s ease; }
        .role-btn.active { background: #1a73e8; color: white; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }

        .btn { background: #2ec4b6; color: white; border: none; padding: 14px; font-size: 1rem; font-weight: 700; border-radius: 8px; cursor: pointer; text-align: center; box-shadow: 0 4px 12px rgba(46,196,182,0.2); transition: all 0.2s ease; }
        .btn:hover { transform: translateY(-1px); }
        .btn-active-broadcast { background: #e63946 !important; animation: pulse-broadcast 1.5s infinite alternate; }

        .status-box { background: #f8f9fa; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .metric-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; }
        .label { font-weight: 600; color: #64748b; }
        .value { font-weight: 700; color: #1e293b; font-family: system-ui, sans-serif; }
        .highlight-value { color: #1a73e8; font-size: 1.05rem; }

        /* Alarm Dashboard Dynamic Banner Alert */
        .alarm-banner {
            display: none; background: #e63946; color: white; border-radius: 8px; padding: 12px;
            text-align: center; font-weight: 700; animation: flash-alert 1s infinite alternate;
            cursor: pointer; font-size: 0.9rem; margin-top: 4px;
        }

        /* Custom Vector CSS Vehicle Pod Icon */
        .custom-bus-icon {
            background: #1a73e8; border: 3px solid white; border-radius: 50% 50% 40% 40%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 36px !important; height: 36px !important;
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 16px; font-weight: bold; transition: transform 0.2s ease;
        }
        .custom-bus-icon::after {
            content: ''; position: absolute; width: 44px; height: 44px;
            border: 2px solid #1a73e8; border-radius: 50%; animation: ripple 1.6s infinite ease-out; opacity: 0;
        }

        /* Custom Academic School Landmark Icon */
        .custom-school-icon {
            background: #ff9f1c; border: 3px solid white; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 36px !important; height: 36px !important;
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 16px; font-weight: bold;
        }

        @keyframes ripple {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        @keyframes pulse-broadcast {
            from { box-shadow: 0 4px 12px rgba(230,57,70,0.3); }
            to { box-shadow: 0 4px 20px rgba(230,57,70,0.7); background: #d90429; }
        }
        @keyframes flash-alert {
            from { background: #e63946; box-shadow: 0 0 4px #e63946; }
            to { background: #b71c1c; box-shadow: 0 0 16px #e63946; }
        }

        /* Hide Default Text Box Content generated by Leaflet Routing plug-ins */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h2 style="font-size: 1.4rem; color: #0f172a; font-weight: 800; letter-spacing: -0.5px;">DIGIM Transit Fleet</h2>
        
        <div class="role-selector">
            <button id="btn-student" class="role-btn active" onclick="setRole('student')">Student View</button>
            <button id="btn-driver" class="role-btn" onclick="setRole('driver')">Driver Panel</button>
        </div>

        <div class="status-box">
            <div class="metric-row">
                <span class="label">Distance Left:</span>
                <span id="lbl-dist" class="value">Calculating...</span>
            </div>
            <div class="metric-row">
                <span class="label">Time to Reach (ETA):</span>
                <span id="lbl-eta" class="value highlight-value">-- mins</span>
            </div>
            <div class="metric-row">
                <span class="label">Vehicle Speed:</span>
                <span id="lbl-speed" class="value">0 km/h</span>
            </div>
            <div class="metric-row" style="margin-top: 4px; padding-top: 8px; border-top: 1px dashed #e2e8f0;">
                <span class="label">Telemetry:</span>
                <span id="lbl-status" class="value" style="color: #64748b;">Initializing Network...</span>
            </div>
        </div>

        <div id="alarm-banner" class="alarm-banner" onclick="silenceAlarm()">⚠️ VEHICLE NEARBY! SILENCE ALARM</div>

        <button id="action-btn" class="btn" style="display:none;" onclick="toggleTracking()">START LIVE BROADCAST</button>
    </div>

    <!-- Leaflet Engine Core Base Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- OSRM Micro-Engine Routing Architecture Plugin -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <!-- Ultra-Low Latency Messaging Engine (MQTT via HiveMQ Cluster Platform) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <script>
        // Target Anchored School Coordinates
        const schoolLat = 17.694125;
        const schoolLng = 83.171441;
        
        let currentRole = 'student';
        let isTracking = false;
        let watchId = null;
        let routingControl = null;
        let lastTimestamp = null;
        let lastPos = null;

        // Alarm Synthesis Variables
        let audioCtx = null;
        let alarmOscillator = null;
        let alarmGain = null;
        let isAlarmPlaying = false;
        let alarmTriggeredToday = false; // Prevents re-triggering constantly on the same trip

        // Initialize Resilient Map Engine Layer
        const map = L.map('map', { zoomControl: false }).setView([schoolLat, schoolLng], 15);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // CartoDB High-Speed Light Vector Tiles (Guarantees zero grey tiles)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 20
        }).addTo(map);

        // Modern Clean Vector CSS Markers Configuration
        const schoolIcon = L.divIcon({ html: '🏫', className: 'custom-school-icon', iconSize: [36, 36], iconAnchor: [18, 18] });
        const busIcon = L.divIcon({ html: '🚌', className: 'custom-bus-icon', iconSize: [36, 36], iconAnchor: [18, 18] });

        L.marker([schoolLat, schoolLng], { icon: schoolIcon }).addTo(map).bindPopup("<b>School Landmark Base</b>");
        let driverMarker = L.marker([0, 0], { icon: busIcon });

        // Switched to wss:// (Secure WebSockets) on Port 8884 to stop browser security blocks
        const mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        const telemetryTopic = "digim/fleet/route/777";

        mqttClient.on('connect', () => {
            document.getElementById('lbl-status').innerText = "Telemetry Network Connected";
            document.getElementById('lbl-status').style.color = "#10b981";
            mqttClient.subscribe(telemetryTopic);
        });

        mqttClient.on('error', (err) => {
            console.error("MQTT Connection Fault:", err);
            document.getElementById('lbl-status').innerText = "Network Retry...";
            document.getElementById('lbl-status').style.color = "#ef4444";
        });

        // Instant Sub-Second Incoming Stream Signal Handler
        mqttClient.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                if (currentRole === 'student') {
                    document.getElementById('lbl-status').innerText = "Live Transmission Sync 🟢";
                    document.getElementById('lbl-status').style.color = "#10b981";
                    processTelemetryUpdate(data.lat, data.lng, data.speed);
                }
            } catch (e) { console.error("Data stream parsing fault", e); }
        });

        // --- AUDIO ALARM SYNTHESIS ENGINE (PROXIMITY RADAR) ---
        function initAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playContinuousAlarm() {
            if (isAlarmPlaying) return;
            initAudioEngine();
            
            isAlarmPlaying = true;
            document.getElementById('alarm-banner').style.display = "block";

            // Create a custom oscillator sweep sound (Siren style, not basic beep)
            alarmOscillator = audioCtx.createOscillator();
            alarmGain = audioCtx.createGain();
            
            alarmOscillator.type = 'sawtooth'; 
            
            // Continuous frequency oscillation modulation loop (Low to high sweep)
            const now = audioCtx.currentTime;
            alarmOscillator.frequency.setValueAtTime(800, now);
            
            // Generate standard linear warning sirens sweeps 
            let duration = 0.4;
            for (let i = 0; i < 300; i++) {
                alarmOscillator.frequency.linearRampToValueAtTime(1200, now + (i * duration) + (duration / 2));
                alarmOscillator.frequency.linearRampToValueAtTime(800, now + ((i + 1) * duration));
            }

            alarmGain.gain.setValueAtTime(0.2, now); // Set comfortable but loud alert volume index
            
            alarmOscillator.connect(alarmGain);
            alarmGain.connect(audioCtx.destination);
            alarmOscillator.start();
        }

        function silenceAlarm() {
            if (isAlarmPlaying && alarmOscillator) {
                try {
                    alarmOscillator.stop();
                    alarmOscillator.disconnect();
                } catch(e) {}
                isAlarmPlaying = false;
            }
            document.getElementById('alarm-banner').style.display = "none";
        }

        function setRole(role) {
            initAudioEngine(); // Secretly unlocks browser audio permission layers via physical click handshake
            currentRole = role;
            document.getElementById('btn-student').classList.toggle('active', role === 'student');
            document.getElementById('btn-driver').classList.toggle('active', role === 'driver');
            
            stopTracking();
            clearRoutingLayers();
            silenceAlarm();

            if (role === 'driver') {
                document.getElementById('action-btn').style.display = "block";
                document.getElementById('lbl-status').innerText = "Ready to emit telemetry vectors.";
                document.getElementById('lbl-status').style.color = "#64748b";
            } else {
                document.getElementById('action-btn').style.display = "none";
                document.getElementById('lbl-status').innerText = "Listening for remote fleet stream...";
                document.getElementById('lbl-status').style.color = "#1a73e8";
            }
        }

        // --- CORE TELEMETRY BROADCAST PIPELINE ---
        function toggleTracking() {
            initAudioEngine();
            if (!isTracking) {
                if (!navigator.geolocation) return alert("System Hardware Geolocation missing.");
                isTracking = true;
                document.getElementById('action-btn').innerText = "HALT BROADCAST PIPELINE";
                document.getElementById('action-btn').classList.add('btn-active-broadcast');
                document.getElementById('lbl-status').innerText = "Broadcasting global vectors...";
                document.getElementById('lbl-status').style.color = "#ef4444";
                alarmTriggeredToday = false; // Reset trigger state configuration array point

                watchId = navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    let calculatedSpeed = pos.coords.speed ? (pos.coords.speed * 3.6) : 0; 
                    const now = performance.now();
                    
                    if (!pos.coords.speed && lastPos && lastTimestamp) {
                        const distanceMoved = calculateHaversine(lastPos.lat, lastPos.lng, lat, lng);
                        const timeElapsedSeconds = (now - lastTimestamp) / 1000;
                        if (timeElapsedSeconds > 0) {
                            calculatedSpeed = (distanceMoved / timeElapsedSeconds) * 3.6;
                        }
                    }
                    
                    lastPos = { lat, lng };
                    lastTimestamp = now;
                    if(calculatedSpeed > 100) calculatedSpeed = 45; 

                    // 1. Render locally on the driver dashboard setup layer
                    processTelemetryUpdate(lat, lng, calculatedSpeed);

                    // 2. Transmit package across secure WebSockets cluster network pipeline immediately
                    if (mqttClient.connected) {
                        mqttClient.publish(telemetryTopic, JSON.stringify({
                            lat: lat, lng: lng, speed: calculatedSpeed
                        }), { qos: 0 });
                    }

                }, (err) => { 
                    document.getElementById('lbl-status').innerText = `GPS Error Code (${err.code})`; 
                    document.getElementById('lbl-status').style.color = "#ef4444";
                }, 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
            } else {
                stopTracking();
            }
        }

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            isTracking = false;
            document.getElementById('action-btn').innerText = "START LIVE BROADCAST";
            document.getElementById('action-btn').classList.remove('btn-active-broadcast');
            if(currentRole === 'driver') {
                document.getElementById('lbl-status').innerText = "Engine Standby";
                document.getElementById('lbl-status').style.color = "#64748b";
            }
        }

        // --- SUB-SECOND ROAD INTERSECTION ROUTING & TELEMETRY DRAW ENGINE ---
        function processTelemetryUpdate(lat, lng, speed) {
            if (!map.hasLayer(driverMarker)) driverMarker.addTo(map);
            driverMarker.setLatLng([lat, lng]);

            document.getElementById('lbl-speed').innerText = `${Math.round(speed)} km/h`;

            if (!routingControl) {
                routingControl = L.Routing.control({
                    waypoints: [ L.latLng(lat, lng), L.latLng(schoolLat, schoolLng) ],
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://router.project-osrm.org/route/v1',
                        profile: 'car'
                    }),
                    createMarker: function() { return null; },
                    lineOptions: {
                        styles: [{ color: '#000000', opacity: 0.9, weight: 6 }] // Crisp Black professional street routing lines
                    },
                    fitSelectedRoutes: false
                }).addTo(map);

                routingControl.on('routesfound', function(e) {
                    const routes = e.routes;
                    const summary = routes[0].summary;
                    const roadDistanceMeters = summary.totalDistance; 
                    
                    let transitSpeedKmH = speed > 5 ? speed : 30; 
                    const transitSpeedMPS = transitSpeedKmH / 3.6;
                    let etaSeconds = roadDistanceMeters / transitSpeedMPS;
                    let etaMinutes = Math.ceil(etaSeconds / 60);

                    // Update UI Labels elements array fields
                    document.getElementById('lbl-dist').innerText = roadDistanceMeters > 1000 
                        ? `${(roadDistanceMeters / 1000).toFixed(2)} km` 
                        : `${Math.round(roadDistanceMeters)} meters`;
                        
                    document.getElementById('lbl-eta').innerText = `${etaMinutes} mins`;

                    // PROXIMITY DETECTION ALARM CHECK: Trigger continuous siren if under 500 meters
                    if (roadDistanceMeters <= 500 && !alarmTriggeredToday) {
                        playContinuousAlarm();
                        alarmTriggeredToday = true; 
                    }
                    
                    // Reset threshold block layer boundary edge condition if vehicle pulls far away
                    if (roadDistanceMeters > 700) {
                        alarmTriggeredToday = false;
                        silenceAlarm();
                    }
                });
            } else {
                routingControl.setWaypoints([ L.latLng(lat, lng), L.latLng(schoolLat, schoolLng) ]);
            }

            const viewBounds = L.latLngBounds([lat, lng], [schoolLat, schoolLng]);
            map.fitBounds(viewBounds.pad(0.2), { animate: true, duration: 0.5 });
        }

        function clearRoutingLayers() {
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }
            if (map.hasLayer(driverMarker)) map.removeLayer(driverMarker);
        }

        function calculateHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371000; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }
    </script>
</body>
</html>
