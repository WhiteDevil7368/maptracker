<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIM - Smart Tracker</title>
    
    <!-- PWA Primary Capabilities -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192.png?text=DIGIM">

    <!-- Core Leaflet Mapping CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #eef2f7; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        .control-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 24px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); width: 360px; 
            display: flex; flex-direction: column; gap: 14px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.6);
        }
        .role-selector { display: flex; gap: 12px; }
        .role-btn { flex: 1; padding: 12px; font-weight: 700; font-size: 0.9rem; border: 2px solid #1a73e8; border-radius: 8px; cursor: pointer; background: white; color: #1a73e8; transition: all 0.2s ease; }
        .role-btn.active { background: #1a73e8; color: white; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
        .btn { background: #2ec4b6; color: white; border: none; padding: 14px; font-size: 1rem; font-weight: 700; border-radius: 8px; cursor: pointer; text-align: center; box-shadow: 0 4px 12px rgba(46,196,182,0.2); }
        .status-box { background: #f8f9fa; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .metric-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; }
        .label { font-weight: 600; color: #64748b; }
        .value { font-weight: 700; color: #1e293b; }
        .highlight-value { color: #1a73e8; font-size: 1.05rem; }
        .alarm-banner { display: none; background: #e63946; color: white; border-radius: 8px; padding: 12px; text-align: center; font-weight: 700; cursor: pointer; }
        .custom-bus-icon { background: #1a73e8; border: 3px solid white; border-radius: 50% 50% 40% 40%; width: 36px !important; height: 36px !important; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .custom-home-icon { background: #ff9f1c; border: 3px solid white; border-radius: 12px; width: 36px !important; height: 36px !important; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h2 style="font-size: 1.4rem; color: #0f172a; font-weight: 800;">DIGIM Transit Fleet</h2>
        
        <div class="role-selector">
            <button id="btn-student" class="role-btn active" onclick="setRole('student')">Student View</button>
            <button id="btn-driver" class="role-btn" onclick="setRole('driver')">Driver Panel</button>
        </div>

        <div class="status-box">
            <div class="metric-row">
                <span class="label">Distance Left:</span>
                <span id="lbl-dist" class="value">Calculating...</span>
            </div>
            <div class="metric-row">
                <span class="label">Time to Reach (ETA):</span>
                <span id="lbl-eta" class="value highlight-value">-- mins</span>
            </div>
            <div class="metric-row">
                <span class="label">Vehicle Speed:</span>
                <span id="lbl-speed" class="value">0 km/h</span>
            </div>
            <div class="metric-row" style="margin-top: 4px; padding-top: 8px; border-top: 1px dashed #e2e8f0;">
                <span class="label">Telemetry:</span>
                <span id="lbl-status" class="value" style="color: #64748b;">Initializing...</span>
            </div>
        </div>

        <div id="alarm-banner" class="alarm-banner" onclick="silenceAlarm()">⚠️ VEHICLE NEARBY! SILENCE ALARM</div>
        <button id="action-btn" class="btn" style="display:none;" onclick="toggleTracking()">START LIVE BROADCAST</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <script>
        // Updated Anchored Coordinates for Student's Home Address
        const homeLat = 17.694158;
        const homeLng = 83.171462;
        
        let currentRole = 'student';
        let isTracking = false;
        let watchId = null;
        let routingControl = null;
        let lastTimestamp = null;
        let lastPos = null;
        let wakeLock = null;

        let audioCtx = null;
        let alarmOscillator = null;
        let alarmGain = null;
        let isAlarmPlaying = false;
        let alarmTriggeredToday = false; 

        // Map Setup centered on new home coordinates
        const map = L.map('map', { zoomControl: false }).setView([homeLat, homeLng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        const homeIcon = L.divIcon({ html: '🏠', className: 'custom-home-icon', iconSize: [36, 36] });
        const busIcon = L.divIcon({ html: '🚌', className: 'custom-bus-icon', iconSize: [36, 36] });

        L.marker([homeLat, homeLng], { icon: homeIcon }).addTo(map).bindPopup("<b>Madhav Kumar's Home</b>");
        let driverMarker = L.marker([0, 0], { icon: busIcon });

        const mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        const telemetryTopic = "digim/fleet/route/777";

        mqttClient.on('connect', () => {
            document.getElementById('lbl-status').innerText = "Connected App";
            document.getElementById('lbl-status').style.color = "#10b981";
            mqttClient.subscribe(telemetryTopic);
        });

        mqttClient.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                if (currentRole === 'student') {
                    processTelemetryUpdate(data.lat, data.lng, data.speed);
                }
            } catch (e) { console.error(e); }
        });

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log("WakeLock failed: " + err.message); }
        }

        function initializeAndUnlockAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            requestWakeLock();
        }

        window.addEventListener('click', initializeAndUnlockAudio, { once: true });
        window.addEventListener('touchstart', initializeAndUnlockAudio, { once: true });

        function playContinuousAlarm() {
            if (isAlarmPlaying) return;
            if (!audioCtx) initializeAndUnlockAudio();
            if (!audioCtx) return; 
            
            isAlarmPlaying = true;
            document.getElementById('alarm-banner').style.display = "block";

            alarmOscillator = audioCtx.createOscillator();
            alarmGain = audioCtx.createGain();
            alarmOscillator.type = 'sawtooth'; 
            
            const now = audioCtx.currentTime;
            alarmOscillator.frequency.setValueAtTime(800, now);
            
            let duration = 0.4;
            for (let i = 0; i < 300; i++) {
                alarmOscillator.frequency.linearRampToValueAtTime(1200, now + (i * duration) + (duration / 2));
                alarmOscillator.frequency.linearRampToValueAtTime(800, now + ((i + 1) * duration));
            }

            alarmGain.gain.setValueAtTime(0.2, now); 
            alarmOscillator.connect(alarmGain);
            alarmGain.connect(audioCtx.destination);
            alarmOscillator.start();
        }

        function silenceAlarm() {
            if (isAlarmPlaying && alarmOscillator) {
                try { alarmOscillator.stop(); alarmOscillator.disconnect(); } catch(e) {}
                isAlarmPlaying = false;
            }
            document.getElementById('alarm-banner').style.display = "none";
        }

        function setRole(role) {
            initializeAndUnlockAudio(); 
            currentRole = role;
            document.getElementById('btn-student').classList.toggle('active', role === 'student');
            document.getElementById('btn-driver').classList.toggle('active', role === 'driver');
            stopTracking(); clearRoutingLayers(); silenceAlarm();

            if (role === 'driver') {
                document.getElementById('action-btn').style.display = "block";
            } else {
                document.getElementById('action-btn').style.display = "none";
            }
        }

        function toggleTracking() {
            initializeAndUnlockAudio();
            if (!isTracking) {
                isTracking = true;
                document.getElementById('action-btn').innerText = "HALT BROADCAST";
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    let speed = pos.coords.speed ? (pos.coords.speed * 3.6) : 25;
                    processTelemetryUpdate(lat, lng, speed);
                    if (mqttClient.connected) {
                        mqttClient.publish(telemetryTopic, JSON.stringify({ lat, lng, speed }));
                    }
                }, null, { enableHighAccuracy: true });
            } else {
                stopTracking();
            }
        }

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            isTracking = false;
            document.getElementById('action-btn').innerText = "START LIVE BROADCAST";
        }

        function processTelemetryUpdate(lat, lng, speed) {
            if (!map.hasLayer(driverMarker)) driverMarker.addTo(map);
            driverMarker.setLatLng([lat, lng]);
            document.getElementById('lbl-speed').innerText = `${Math.round(speed)} km/h`;

            if (!routingControl) {
                routingControl = L.Routing.control({
                    waypoints: [ L.latLng(lat, lng), L.latLng(homeLat, homeLng) ],
                    router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'car' }),
                    createMarker: function() { return null; },
                    fitSelectedRoutes: false
                }).addTo(map);

                routingControl.on('routesfound', function(e) {
                    const roadDistanceMeters = e.routes[0].summary.totalDistance; 
                    document.getElementById('lbl-dist').innerText = `${Math.round(roadDistanceMeters)} m`;
                    document.getElementById('lbl-eta').innerText = `${Math.ceil((roadDistanceMeters/(speed/3.6))/60)} mins`;

                    if (currentRole === 'student') {
                        if (roadDistanceMeters <= 50 && !alarmTriggeredToday) {
                            playContinuousAlarm();
                            alarmTriggeredToday = true; 
                        }
                    }
                });
            } else {
                routingControl.setWaypoints([ L.latLng(lat, lng), L.latLng(homeLat, homeLng) ]);
            }
        }

        function clearRoutingLayers() {
            if (routingControl) { map.removeControl(routingControl); routingControl = null; }
            if (map.hasLayer(driverMarker)) map.removeLayer(driverMarker);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Active"))
            .catch(err => console.log("SW Registry Fault", err));
        }
    </script>
</body>
</html>
